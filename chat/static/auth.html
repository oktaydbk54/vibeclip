<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>VibeClip Studio — Sign in</title>
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
<link rel="icon" type="image/x-icon" href="/static/favicon.ico" sizes="any">
<link rel="apple-touch-icon" href="/static/apple-touch-icon.png">
<meta name="theme-color" content="#9b5cff">
<meta name="robots" content="noindex, nofollow">

<style>
:root{
  --ink:#0a0712; --panel:#130d1f; --panel2:#181020; --raise:#1d1430;
  --line:#2a2040; --line-hi:#3a2c54;
  --bone:#e7e2f2; --bone-dim:#918aa6; --bone-faint:#615a73;
  --accent:#9b5cff; --accent-dim:#4a2d80; --accent-glow:rgba(155,92,255,.14);
  --accent-ink:#f7f3ff; --accent-hi:#c08bff; --red:#f4524d;
}
*{box-sizing:border-box; margin:0; padding:0}
body{min-height:100vh; background:var(--ink); color:var(--bone);
  font-family:'Archivo',system-ui,sans-serif; font-size:15px;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:20px; padding:32px;
  background-image:
    repeating-linear-gradient(90deg, rgba(155,92,255,.025) 0 1px, transparent 1px 64px),
    repeating-linear-gradient(0deg, rgba(255,255,255,.012) 0 1px, transparent 1px 64px);}
.mono{font-family:'IBM Plex Mono',monospace}
a{color:inherit; text-decoration:none}
.brand{display:flex; align-items:center; gap:9px}
.brand-block{width:10px; height:18px; border-radius:2px; background:var(--accent);
  box-shadow:0 0 12px var(--accent-glow)}
.brand .word{font-weight:800; font-size:1.05rem; letter-spacing:.14em}
.brand .sub{font-size:.56rem; letter-spacing:.34em; color:var(--bone-faint);
  text-transform:uppercase; font-family:'IBM Plex Mono',monospace}

.card{width:100%; max-width:400px; background:var(--panel);
  border:1px solid var(--line); border-radius:14px; padding:30px 30px 28px;
  position:relative; box-shadow:0 30px 80px -34px rgba(0,0,0,.85)}
.card::before{content:""; position:absolute; top:0; left:0; right:0; height:2px;
  border-radius:14px 14px 0 0;
  background:linear-gradient(90deg, var(--accent) 0%, transparent 42%)}
.tabs{display:flex; gap:0; border-bottom:1px solid var(--line); margin-bottom:22px}
.tab{flex:1; text-align:center; padding:11px 0; cursor:pointer;
  font-family:'IBM Plex Mono',monospace; font-size:.62rem; letter-spacing:.18em;
  color:var(--bone-faint); text-transform:uppercase; border-bottom:2px solid transparent;
  transition:color .15s; background:none; border-top:none; border-left:none; border-right:none}
.tab:hover{color:var(--bone-dim)}
.tab.on{color:var(--accent); border-bottom-color:var(--accent)}

form{display:none; flex-direction:column; gap:13px}
form.on{display:flex; animation:fade .25s ease both}
@keyframes fade{from{opacity:0; transform:translateY(6px)}to{opacity:1; transform:none}}
.field label{display:block; font-family:'IBM Plex Mono',monospace; font-size:.56rem;
  letter-spacing:.16em; color:var(--bone-faint); text-transform:uppercase; margin-bottom:6px}
.field input{width:100%; background:var(--ink); border:1px solid var(--line-hi);
  border-radius:7px; padding:11px 13px; color:var(--bone); font-size:.9rem;
  font-family:inherit; outline:none; transition:border-color .15s}
.field input:focus{border-color:var(--accent-dim)}
.submit{width:100%; margin-top:4px; background:var(--accent); color:var(--accent-ink);
  border:none; border-radius:7px; padding:12px; font-weight:700; cursor:pointer;
  font-family:'IBM Plex Mono',monospace; font-size:.68rem; letter-spacing:.14em;
  text-transform:uppercase; transition:filter .15s}
.submit:hover{filter:brightness(1.08)}
.submit:disabled{opacity:.5; cursor:default}
.err{display:none; color:var(--red); font-size:.74rem; line-height:1.4;
  background:rgba(244,82,77,.08); border:1px solid rgba(244,82,77,.3);
  border-radius:6px; padding:8px 11px}
.err.on{display:block}
.switch{text-align:center; font-family:'IBM Plex Mono',monospace; font-size:.62rem;
  color:var(--bone-faint); margin-top:18px}
.switch a{color:var(--accent); cursor:pointer}
.switch a:hover{text-decoration:underline}
.verify-msg{font-size:.74rem; line-height:1.5; color:var(--bone-dim); margin-bottom:4px}
.verify-msg b{color:var(--bone)}
.code-input{text-align:center; font-size:1.5rem !important; letter-spacing:.5em;
  font-family:'IBM Plex Mono',monospace !important; padding:13px 13px 13px 18px !important}
.resend{text-align:center; font-size:.6rem; color:var(--bone-faint); margin-top:6px}
.resend a{color:var(--accent); cursor:pointer}
.resend a:hover{text-decoration:underline}
.resend a.wait{color:var(--bone-faint); cursor:default; text-decoration:none}

/* ---- split-screen shell: form left, looping product showcase right ---- */
.auth-shell{display:flex; gap:22px; width:100%; max-width:880px;
  align-items:stretch; justify-content:center}
.auth-shell .card{flex:0 0 400px; max-width:400px}
.auth-right{flex:1 1 0; min-width:0; position:relative; overflow:hidden;
  border:1px solid var(--line); border-radius:14px;
  background:linear-gradient(180deg,var(--panel2),var(--ink));
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:24px; padding:38px 30px; box-shadow:0 30px 80px -34px rgba(0,0,0,.85)}
.ar-glow{position:absolute; top:-8%; left:50%; transform:translateX(-50%);
  width:380px; height:380px; border-radius:50%; pointer-events:none;
  background:radial-gradient(closest-side, rgba(155,92,255,.22), transparent 70%);
  filter:blur(8px)}
.ar-phone{position:relative; z-index:1; width:194px; aspect-ratio:9/16;
  border-radius:22px; overflow:hidden; background:#000; border:1px solid var(--line-hi);
  box-shadow:0 36px 84px -30px rgba(155,92,255,.6); transform:rotate(-3deg)}
.ar-phone video{width:100%; height:100%; object-fit:cover; display:block}
.ar-copy{position:relative; z-index:1; text-align:center; max-width:300px}
.ar-h{font-family:'Archivo',sans-serif; font-weight:800; font-size:1.3rem;
  line-height:1.14; letter-spacing:-.01em; margin-bottom:9px}
.ar-h b{color:var(--accent-hi)}
.ar-sub{font-size:.8rem; color:var(--bone-dim); line-height:1.55; margin-bottom:14px}
.ar-trust{font-size:.54rem; letter-spacing:.16em; color:var(--bone-faint)}
@media(max-width:760px){
  .auth-right{display:none}
  .auth-shell{max-width:400px}
  .auth-shell .card{flex:1 1 auto}
}

/* ---- 6-box OTP input ---- */
.otp{display:flex; gap:8px; justify-content:space-between}
.otp-box{flex:1; min-width:0; width:100%; text-align:center; background:var(--ink);
  border:1px solid var(--line-hi); border-radius:8px; padding:13px 0; color:var(--bone);
  font-size:1.3rem; font-family:'IBM Plex Mono',monospace; outline:none;
  transition:border-color .15s, box-shadow .15s}
.otp-box:focus{border-color:var(--accent); box-shadow:0 0 0 1px var(--accent-dim)}
.otp-box.filled{border-color:var(--accent-dim)}
</style>
</head>
<body>

<a href="/" class="brand" aria-label="VibeClip studio">
  <span class="brand-block"></span>
  <span class="word">VibeClip</span><span class="sub">studio</span>
</a>

<div class="auth-shell">
<div class="card">
  <div class="tabs">
    <button class="tab on" id="tabLogin" data-tab="login">SIGN IN</button>
    <button class="tab" id="tabSignup" data-tab="signup">SIGN UP</button>
  </div>

  <div class="err mono" id="err"></div>

  <!-- SIGN IN -->
  <form class="on" id="formLogin" novalidate>
    <div class="field">
      <label>Email</label>
      <input type="email" name="email" autocomplete="email" required>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" name="password" autocomplete="current-password" required>
    </div>
    <button type="submit" class="submit">SIGN IN</button>
  </form>

  <!-- SIGN UP -->
  <form id="formSignup" novalidate>
    <div class="field">
      <label>Full name</label>
      <input type="text" name="name" autocomplete="name" required>
    </div>
    <div class="field">
      <label>Email</label>
      <input type="email" name="email" autocomplete="email" required>
    </div>
    <div class="field">
      <label>Password (min 6 characters)</label>
      <input type="password" name="password" autocomplete="new-password" minlength="6" required>
    </div>
    <button type="submit" class="submit">CREATE ACCOUNT</button>
  </form>

  <!-- VERIFY EMAIL -->
  <form id="formVerify" novalidate>
    <p class="verify-msg mono" id="verifyMsg">We sent a 6-digit code to your email.</p>
    <div class="field">
      <label>Verification code</label>
      <div class="otp" id="otp">
        <input class="otp-box" inputmode="numeric" maxlength="1" autocomplete="one-time-code" aria-label="Digit 1">
        <input class="otp-box" inputmode="numeric" maxlength="1" aria-label="Digit 2">
        <input class="otp-box" inputmode="numeric" maxlength="1" aria-label="Digit 3">
        <input class="otp-box" inputmode="numeric" maxlength="1" aria-label="Digit 4">
        <input class="otp-box" inputmode="numeric" maxlength="1" aria-label="Digit 5">
        <input class="otp-box" inputmode="numeric" maxlength="1" aria-label="Digit 6">
      </div>
      <input type="hidden" name="code">
    </div>
    <button type="submit" class="submit">VERIFY &amp; CONTINUE</button>
    <div class="resend mono" id="resend">
      Didn't get it? <a id="resendLink">Resend code</a>
    </div>
  </form>

  <div class="switch" id="switch"></div>
</div>

<aside class="auth-right" aria-hidden="true">
  <div class="ar-glow"></div>
  <div class="ar-phone">
    <video src="/static/demo/demo_mb.mp4" muted loop autoplay playsinline
           preload="auto" poster="/static/demo/poster.jpg"></video>
  </div>
  <div class="ar-copy">
    <div class="ar-h">Edit video by <b>talking</b> to it.</div>
    <div class="ar-sub">Turn long videos into publish-ready vertical clips — captioned,
      reframed, and scored. Just describe the edit.</div>
    <div class="ar-trust mono">FREE DURING EARLY ACCESS · NO CARD REQUIRED</div>
  </div>
</aside>
</div><!-- /.auth-shell -->

<script>
(function () {
  "use strict";
  var tabLogin = document.getElementById("tabLogin");
  var tabSignup = document.getElementById("tabSignup");
  var formLogin = document.getElementById("formLogin");
  var formSignup = document.getElementById("formSignup");
  var formVerify = document.getElementById("formVerify");
  var tabsEl = document.querySelector(".tabs");
  var errEl = document.getElementById("err");
  var switchEl = document.getElementById("switch");
  var verifyMsg = document.getElementById("verifyMsg");
  var resendBox = document.getElementById("resend");
  var resendLink = document.getElementById("resendLink");

  var pendingEmail = sessionStorage.getItem("vc_pending_email") || "";
  var resendTimer = null;

  // 6-box OTP: visible boxes drive the hidden input[name=code] the verify form
  // submits. Auto-advance, backspace-to-previous, paste-to-fill, auto-submit at 6.
  var otp = (function () {
    var boxes = [].slice.call(formVerify.querySelectorAll(".otp-box"));
    var hidden = formVerify.querySelector('input[name=code]');
    function sync() {
      hidden.value = boxes.map(function (b) { return b.value; }).join("");
      boxes.forEach(function (b) { b.classList.toggle("filled", !!b.value); });
    }
    function maybeSubmit() {
      if (hidden.value.length === 6) {
        if (formVerify.requestSubmit) formVerify.requestSubmit();
        else formVerify.querySelector(".submit").click();
      }
    }
    boxes.forEach(function (b, i) {
      b.addEventListener("input", function () {
        b.value = b.value.replace(/\D/g, "").slice(0, 1);
        if (b.value && i < boxes.length - 1) boxes[i + 1].focus();
        sync(); maybeSubmit();
      });
      b.addEventListener("keydown", function (e) {
        if (e.key === "Backspace" && !b.value && i > 0) { boxes[i - 1].focus(); }
      });
      b.addEventListener("paste", function (e) {
        e.preventDefault();
        var t = ((e.clipboardData || window.clipboardData).getData("text") || "")
                  .replace(/\D/g, "").slice(0, 6);
        boxes.forEach(function (bb, j) { bb.value = t[j] || ""; });
        sync(); (boxes[Math.min(t.length, 5)] || boxes[5]).focus(); maybeSubmit();
      });
    });
    return {
      clear: function () { boxes.forEach(function (b) { b.value = ""; b.classList.remove("filled"); }); hidden.value = ""; },
      focus: function () { if (boxes[0]) boxes[0].focus(); },
    };
  })();

  function showErr(msg) {
    errEl.textContent = msg;
    errEl.classList.toggle("on", !!msg);
  }

  function setMode(mode) {
    var login = mode === "login", verify = mode === "verify";
    formLogin.classList.toggle("on", login);
    formSignup.classList.toggle("on", mode === "signup");
    formVerify.classList.toggle("on", verify);
    tabLogin.classList.toggle("on", login);
    tabSignup.classList.toggle("on", mode === "signup");
    // Tabs + the login/signup switcher are hidden on the verify step.
    tabsEl.style.display = verify ? "none" : "flex";
    switchEl.style.display = verify ? "none" : "block";
    showErr("");
    if (verify) {
      verifyMsg.innerHTML = pendingEmail
        ? 'We sent a 6-digit code to <b>' + pendingEmail + '</b>.'
        : 'We sent a 6-digit code to your email.';
      startResendCooldown(45);
      otp.clear();
      setTimeout(function () { otp.focus(); }, 50);
      return;
    }
    switchEl.innerHTML = login
      ? 'No account yet? <a id="sw">Sign up</a>'
      : 'Already have an account? <a id="sw">Sign in</a>';
    document.getElementById("sw").onclick = function () {
      setMode(login ? "signup" : "login");
    };
  }

  function gotoVerify(email) {
    pendingEmail = (email || "").trim();
    sessionStorage.setItem("vc_pending_email", pendingEmail);
    setMode("verify");
  }

  function startResendCooldown(secs) {
    clearInterval(resendTimer);
    var left = secs;
    function tick() {
      if (left <= 0) {
        clearInterval(resendTimer);
        resendLink.classList.remove("wait");
        resendLink.textContent = "Resend code";
        return;
      }
      resendLink.classList.add("wait");
      resendLink.textContent = "Resend in " + left + "s";
      left--;
    }
    tick();
    resendTimer = setInterval(tick, 1000);
  }

  tabLogin.onclick = function () { setMode("login"); };
  tabSignup.onclick = function () { setMode("signup"); };

  // Resend handler
  resendLink.onclick = async function () {
    if (resendLink.classList.contains("wait") || !pendingEmail) return;
    showErr("");
    try {
      var r = await fetch("/api/auth/resend", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email: pendingEmail }),
      });
      var d = {}; try { d = await r.json(); } catch (e) {}
      if (r.ok) { startResendCooldown(45); }
      else { showErr(d.error || "Could not resend. Try again shortly."); }
    } catch (e) { showErr("Could not reach the server."); }
  };

  // Initial mode: /verify (with a pending email) shows verification; else login/signup.
  if (location.pathname === "/verify" && pendingEmail) setMode("verify");
  else setMode(location.pathname === "/signup" ? "signup" : "login");

  function submit(form, url, build, onResp) {
    form.addEventListener("submit", async function (e) {
      e.preventDefault();
      showErr("");
      var btn = form.querySelector(".submit");
      var label = btn.textContent;
      btn.disabled = true;
      btn.textContent = "...";
      try {
        var r = await fetch(url, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(build(form)),
        });
        var data = {};
        try { data = await r.json(); } catch (e2) {}
        if (onResp && onResp(r, data)) { /* handled (e.g. routed to verify) */ }
        else if (r.ok) {
          if (data.next === "/verify") { gotoVerify(build(form).email); }
          else { sessionStorage.removeItem("vc_pending_email");
                 location.href = data.next || "/studio"; }
          btn.disabled = false; btn.textContent = label; return;
        } else {
          showErr(data.error || "Something went wrong, please try again.");
        }
      } catch (e3) {
        showErr("Could not reach the server.");
      }
      btn.disabled = false;
      btn.textContent = label;
    });
  }

  submit(formLogin, "/api/auth/login", function (f) {
    return { email: f.email.value.trim(), password: f.password.value };
  }, function (r, data) {
    // Unverified accounts get routed to the verify step.
    if (r.status === 403 && data.next === "/verify") {
      gotoVerify(data.email); return true;
    }
    return false;
  });

  submit(formSignup, "/api/auth/signup", function (f) {
    return {
      name: f.name.value.trim(),
      email: f.email.value.trim(),
      password: f.password.value,
    };
  });

  submit(formVerify, "/api/auth/verify", function () {
    return { email: pendingEmail,
             code: formVerify.querySelector('input[name=code]').value.trim() };
  });
})();
</script>
<script>
/* Belt-and-suspenders autoplay for the showcase loop (muted autoplay can be
   deferred by the browser until the tab is focused). */
(function () {
  var v = document.querySelector(".ar-phone video");
  if (!v) return;
  function go() { var p = v.play(); if (p && p.catch) p.catch(function () {}); }
  v.addEventListener("canplay", go); go();
  document.addEventListener("visibilitychange", function () { if (!document.hidden) go(); });
})();
</script>
<script src="/static/mascot.js" defer></script>
</body>
</html>
